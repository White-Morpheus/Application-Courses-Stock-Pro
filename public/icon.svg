<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <!-- Emerald Accent Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <!-- Soft White/Silver Gradient for Cardboard Box -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>

  <!-- Icon Rounded Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Subtle Outer Glowing Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#emeraldGrad)" stroke-width="3" stroke-opacity="0.15" stroke-dasharray="12 12" />

  <!-- Main Illustration Group -->
  <g id="logo-symbol">
    <!-- 1. The Shopping Bag peeking out of the box -->
    <!-- Handles -->
    <path d="M 226 180 C 226 135, 286 135, 286 180" fill="none" stroke="url(#emeraldGrad)" stroke-width="9" stroke-linecap="round" />
    <path d="M 234 180 C 234 145, 278 145, 278 180" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round" opacity="0.8" />

    <!-- Items inside the bag -->
    <!-- Yellow Orange/Lemon -->
    <circle cx="282" cy="165" r="22" fill="#fbbf24" />
    <!-- Blue carton box -->
    <rect x="204" y="135" width="46" height="70" rx="8" fill="#38bdf8" />
    <line x1="214" y1="155" x2="240" y2="155" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="214" y1="167" x2="232" y2="167" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />

    <!-- The Bag Body -->
    <rect x="186" y="180" width="140" height="150" rx="16" fill="#1e293b" stroke="#475569" stroke-width="10" />

    <!-- 2. The Open Cardboard Shipping Box (layered in front of the bag) -->
    <!-- Left Flap -->
    <path d="M 146 270 L 86 210 L 146 235 Z" fill="#334155" stroke="url(#silverGrad)" stroke-width="10" stroke-linejoin="round" />
    
    <!-- Right Flap -->
    <path d="M 366 270 L 426 210 L 366 235 Z" fill="#334155" stroke="url(#silverGrad)" stroke-width="10" stroke-linejoin="round" />

    <!-- Box Front Face -->
    <rect x="146" y="270" width="220" height="130" rx="14" fill="#0f172a" stroke="url(#silverGrad)" stroke-width="12" fill-opacity="0.95" stroke-linejoin="round" />

    <!-- 3. Checkmark Emblem in the Center of the Box -->
    <circle cx="256" cy="335" r="36" fill="url(#emeraldGrad)" />
    <!-- Checkmark Path -->
    <path d="M 238 335 L 250 347 L 274 323" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />

    <!-- 4. Reload Circular Loop (top-right side) -->
    <path d="M 380 150 A 32 32 0 1 0 345 178" fill="none" stroke="url(#emeraldGrad)" stroke-width="9" stroke-linecap="round" />
    <!-- Reload Arrowhead -->
    <path d="M 368 142 L 380 150 L 392 138" fill="none" stroke="url(#emeraldGrad)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
