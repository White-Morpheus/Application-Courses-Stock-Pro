<!doctype html>
<html lang="fr" class="h-full bg-slate-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.json?v=2" crossorigin="use-credentials" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <title>Check&amp;Reload - Gestion de Stock &amp; Courses en temps réel</title>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Enregistrement du Service Worker uniquement hors de localhost/127.0.0.1 pour permettre le test de la PWA en ligne
      if ("serviceWorker" in navigator && 
          !window.location.hostname.includes("localhost") && 
          !window.location.hostname.includes("127.0.0.1")) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => console.log("[PWA] Service Worker registered successfully:", reg.scope))
            .catch((err) => console.error("[PWA] Service Worker registration failed:", err));
        });
      } else if ("serviceWorker" in navigator && 
                 (window.location.hostname.includes("localhost") || 
                  window.location.hostname.includes("127.0.0.1"))) {
        // En mode développement, on désenregistre activement tout Service Worker existant pour nettoyer le cache de développement
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          let hasUnregistered = false;
          for (let registration of registrations) {
            registration.unregister().then((success) => {
              if (success) {
                console.log("[PWA] Service Worker précédent désenregistré avec succès pour le mode développement.");
                hasUnregistered = true;
              }
            });
          }
          if (hasUnregistered) {
            // Recharger une seule fois pour vider l'interception
            setTimeout(() => {
              window.location.reload();
            }, 500);
          }
        }).catch((err) => console.warn("[PWA] Échec du nettoyage du Service Worker :", err));
      }
    </script>
  </body>
</html>
